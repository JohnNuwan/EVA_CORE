# Catalog entry for Industrial Connectivity MCP Server.
manifest_version: 1

name: industrial-connectivity
description: OPC-UA and Beckhoff ADS connectivity simulator to browse, read, and write PLC tags.
source: local

transport:
  type: stdio
  command: "python"
  args:
    - "optional-mcps/industrial-connectivity/server.py"

auth:
  type: none

post_install: |
  Le serveur de connectivité industrielle utilise le protocole standard MCP.
  Installez les dépendances nécessaires dans l'environnement virtuel avec :
    pip install mcp
